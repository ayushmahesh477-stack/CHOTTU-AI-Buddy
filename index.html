<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chottu - JARVIS AI Assistant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%),
        url('final.png') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 1.5rem;
    }

    .chottu-container {
      width: 100%;
      max-width: 1100px;
      height: 90vh;
      max-height: 850px;
      background: rgba(6, 18, 14, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 170, 0.35);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 255, 170, 0.25);
      border-radius: 2.5rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .assistant-header {
      padding: 1.4rem 2rem;
      border-bottom: 1px solid rgba(0, 255, 170, 0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(4, 12, 10, 0.6);
      backdrop-filter: blur(15px);
      flex-wrap: wrap;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .chottu-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.8)) drop-shadow(0 0 25px rgba(0, 255, 170, 0.4));
      animation: orbPulse 3s ease-in-out infinite;
    }

    .chottu-icon.listening {
      animation: orbListening 0.6s ease-in-out infinite;
    }

    .chottu-icon.speaking {
      animation: orbSpeak 0.4s ease-in-out infinite;
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.8)) drop-shadow(0 0 25px rgba(0, 255, 170, 0.4)); }
      50% { transform: scale(1.08); filter: drop-shadow(0 0 25px rgba(138, 43, 226, 1)) drop-shadow(0 0 40px rgba(0, 255, 170, 0.6)); }
    }

    @keyframes orbListening {
      0%, 100% { transform: scale(1.1); filter: drop-shadow(0 0 30px rgba(255, 0, 68, 1)) drop-shadow(0 0 50px rgba(255, 100, 0, 0.8)); }
      50% { transform: scale(1.2); filter: drop-shadow(0 0 50px rgba(255, 0, 68, 1)) drop-shadow(0 0 80px rgba(255, 100, 0, 1)); }
    }

    @keyframes orbSpeak {
      0%, 100% { transform: scale(1.05); }
      50% { transform: scale(1.15); }
    }

    .logo-text {
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 2px;
      background: linear-gradient(to right, #a0ffe0, #00ffaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
    }

    .status-panel {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: rgba(4, 20, 15, 0.8);
      padding: 0.6rem 1.8rem;
      border-radius: 3rem;
      border: 1px solid rgba(0, 255, 170, 0.5);
      box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
    }

    .core-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #b5ffe0;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .pulse {
      width: 12px;
      height: 12px;
      background: #00ffaa;
      border-radius: 50%;
      box-shadow: 0 0 20px #00ffaa;
      animation: pulseGlow 1.6s infinite;
    }

    .pulse.listening {
      background: #ff0044;
      box-shadow: 0 0 20px #ff0044;
      animation: pulseListening 0.8s infinite;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.9; transform: scale(1); box-shadow: 0 0 10px #00ffaa; }
      50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 30px #00ffaa; }
      100% { opacity: 0.9; transform: scale(1); box-shadow: 0 0 10px #00ffaa; }
    }

    @keyframes pulseListening {
      0% { opacity: 1; transform: scale(1); box-shadow: 0 0 15px #ff0044; }
      50% { opacity: 1; transform: scale(1.4); box-shadow: 0 0 40px #ff0044; }
      100% { opacity: 1; transform: scale(1); box-shadow: 0 0 15px #ff0044; }
    }

    .neural-badge {
      background: #041410;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #7fffcf;
      border: 1px solid #00ffaa;
      letter-spacing: 0.5px;
    }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 2rem;
      overflow-y: auto;
      gap: 1.2rem;
      scroll-behavior: smooth;
      background: transparent;
    }

    .chat-main::-webkit-scrollbar {
      width: 6px;
    }
    .chat-main::-webkit-scrollbar-track {
      background: rgba(4, 20, 15, 0.3);
      border-radius: 10px;
    }
    .chat-main::-webkit-scrollbar-thumb {
      background: #00ffaa;
      border-radius: 10px;
      box-shadow: 0 0 15px #00ffaa;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      animation: fadeSlide 0.25s ease-out;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(4, 20, 15, 0.9);
      border: 1px solid #00ffaa;
      box-shadow: 0 0 18px rgba(0, 255, 170, 0.4);
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.6));
    }

    .avatar i {
      color: #00ffaa;
      font-size: 1.4rem;
    }

    .user .avatar {
      background: rgba(0, 150, 100, 0.3);
      border-color: #00ffaa;
      color: white;
      box-shadow: 0 0 18px #00ffaa;
    }

    .bubble {
      background: rgba(4, 16, 12, 0.85);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(0, 255, 170, 0.35);
      border-radius: 1.5rem 1.5rem 1.5rem 0.3rem;
      padding: 1rem 1.4rem;
      max-width: 70%;
      color: #e0fff0;
      font-size: 0.98rem;
      line-height: 1.55;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6), 0 0 15px rgba(0,255,170,0.15);
      word-wrap: break-word;
    }

    .user .bubble {
      background: rgba(0, 80, 50, 0.6);
      border: 1px solid #00ffaa;
      border-radius: 1.5rem 1.5rem 0.3rem 1.5rem;
      box-shadow: 0 10px 25px rgba(0,255,170,0.15);
      color: white;
    }

    .input-zone {
      padding: 1.2rem 1.8rem;
      border-top: 1px solid rgba(0, 255, 170, 0.3);
      background: rgba(3, 10, 8, 0.85);
      backdrop-filter: blur(25px);
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .command-input {
      flex: 1;
      background: rgba(2, 12, 8, 0.9);
      border: 1px solid #00ffaa;
      border-radius: 2.5rem;
      padding: 0.9rem 1.7rem;
      font-size: 1rem;
      color: #e0ffe8;
      outline: none;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 20px rgba(0,255,170,0.1);
      transition: 0.2s;
      letter-spacing: 0.3px;
    }
    .command-input::placeholder {
      color: #5a8a73;
      font-style: italic;
    }
    .command-input:focus {
      border-color: #00ffaa;
      box-shadow: 0 0 35px rgba(0,255,170,0.4);
    }

    .btn-group {
      display: flex;
      gap: 0.7rem;
    }

    .send-btn, .speaker-btn, .clear-btn, .export-btn, .import-btn {
      border: 1px solid #00ffaa;
      color: #00ffaa;
      font-size: 1.2rem;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 0 20px rgba(0,255,170,0.3);
      background: radial-gradient(circle at 30% 30%, #00442c, #00140e);
    }
    .send-btn:hover:not(:disabled), .speaker-btn:hover:not(:disabled), .clear-btn:hover:not(:disabled), .export-btn:hover:not(:disabled), .import-btn:hover:not(:disabled) {
      background: #00ffaa;
      color: #000;
      border-color: white;
      box-shadow: 0 0 40px #00ffaa;
      transform: scale(1.05);
    }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .speaker-btn.muted {
      opacity: 0.5;
      border-color: #ff0044;
      color: #ff0044;
    }

    .quick-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.2rem;
      flex-wrap: wrap;
    }
    .chip {
      background: rgba(0, 255, 170, 0.1);
      border: 1px solid #00ffaa;
      color: #b5ffe0;
      padding: 0.3rem 1.2rem;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }
    .chip:hover {
      background: rgba(0, 255, 170, 0.25);
      border-color: white;
      color: white;
      box-shadow: 0 0 18px #00ffaa;
    }

    @media (max-width: 700px) {
      .chottu-container {
        height: 95vh;
      }
      .bubble {
        max-width: 85%;
      }
      .btn-group {
        gap: 0.5rem;
      }
      .send-btn, .speaker-btn, .clear-btn, .export-btn, .import-btn {
        width: 45px;
        height: 45px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
<div class="chottu-container">
  <header class="assistant-header">
    <div class="logo-area">
      <img src="nethu_core.png" alt="Chottu Core" class="chottu-icon" id="chottuIcon">
      <div class="logo-text">CHOTTU</div>
    </div>
    <div class="status-panel">
      <div class="core-status" id="wakeToggle" title="Click to toggle wake word">
        <span class="pulse" id="statusPulse"></span>
        <span id="statusText">WAKE WORD OFF</span>
      </div>
      <div class="neural-badge"><i class="fas fa-shield-alt"></i> ENCRYPTED</div>
      <div class="neural-badge"><i class="fas fa-satellite"></i> NEXUS-LINK</div>
    </div>
  </header>

  <div class="chat-main" id="chatWindow"></div>

  <div class="input-zone">
    <div style="display: flex; flex-direction: column; width: 100%; gap: 0.4rem;">
      <div style="display: flex; gap: 1rem; align-items: center;">
        <input type="text" class="command-input" id="userInput" placeholder="Enter directive or say 'Hey Chottu'..." autofocus autocomplete="off">
        <div class="btn-group">
          <button class="export-btn" id="exportButton" title="Export chat history"><i class="fas fa-download"></i></button>
          <button class="import-btn" id="importButton" title="Import chat history"><i class="fas fa-upload"></i></button>
          <button class="clear-btn" id="clearButton" title="Clear chat history"><i class="fas fa-trash"></i></button>
          <button class="speaker-btn" id="speakerButton" title="Toggle voice output"><i class="fas fa-volume-up"></i></button>
          <button class="send-btn" id="sendButton"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
      <div class="quick-actions">
        <span class="chip" data-query="What's the weather in Chennai">🌤️ Weather</span>
        <span class="chip" data-query="What time is it">🕒 Time</span>
        <span class="chip" data-query="Latest news headlines">📰 News</span>
        <span class="chip" data-query="IPL 2026 status">🏏 IPL Status</span>
        <span class="chip" data-query="Who won IPL 2026">🏆 IPL Winner</span>
        <span class="chip" data-query="Open YouTube">▶ YouTube</span>
        <span class="chip" data-query="Open Gmail">📧 Gmail</span>
        <span class="chip" data-query="Enable wake word">🎤 Wake Word</span>
      </div>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none">

<script>
  (function() {
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendButton');
    const speakerBtn = document.getElementById('speakerButton');
    const clearBtn = document.getElementById('clearButton');
    const exportBtn = document.getElementById('exportButton');
    const importBtn = document.getElementById('importButton');
    const importFile = document.getElementById('importFile');
    const wakeToggle = document.getElementById('wakeToggle');
    const statusPulse = document.getElementById('statusPulse');
    const statusText = document.getElementById('statusText');
    const chottuIcon = document.getElementById('chottuIcon');

    const CHOTTU_ENDPOINT = '/api/chat';
    const STORAGE_KEY = 'chottu_chat_history';
    const NAME_KEY = 'chottu_username';

    let USER_NAME = localStorage.getItem(NAME_KEY) || 'sir';

    const JARVIS_PROMPT = `You are Chottu - an AI assistant that responds exactly like JARVIS from Iron Man.
Call the user "${USER_NAME}" or "sir". Be concise (2-3 sentences). Be direct and professional. Never say "as an AI".`;

    let conversationHistory = [];
    let voiceEnabled = true;
    let wakeWordEnabled = false;
    let wakeRecognition = null;
    let commandRecognition = null;
    let isListeningForCommand = false;
    let hasGreeted = false;

    // Load chat history
    function loadChatHistory() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          conversationHistory = JSON.parse(saved);
          conversationHistory.forEach(msg => {
            if (msg.role === 'user') appendMessage(msg.content, 'user');
            else if (msg.role === 'assistant') appendMessage(msg.content, 'assistant');
          });
          return true;
        } catch(e) { localStorage.removeItem(STORAGE_KEY); }
      }
      return false;
    }

    function saveChatHistory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
      } catch(e) {}
    }

    function appendMessage(text, sender = 'assistant') {
      const row = document.createElement('div');
      row.className = `message-row ${sender}`;
      
      const avatarHtml = sender === 'user'
        ? `<div class="avatar"><i class="fas fa-user-astronaut"></i></div>`
        : `<div class="avatar"><img src="nethu_core.png" alt="Chottu"></div>`;
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = text.replace(/\n/g, '<br>');
      
      if (sender === 'user') {
        row.appendChild(bubble);
        row.appendChild(document.createRange().createContextualFragment(avatarHtml));
      } else {
        row.appendChild(document.createRange().createContextualFragment(avatarHtml));
        row.appendChild(bubble);
      }
      
      chatWindow.appendChild(row);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function speak(text) {
      if (!voiceEnabled || !('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const cleanText = text.replace(/<[^>]*>/g, '').replace(/[*_#`]/g, '');
      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.rate = 0.95;
      utterance.pitch = 0.7;
      utterance.onstart = () => chottuIcon?.classList.add('speaking');
      utterance.onend = () => chottuIcon?.classList.remove('speaking');
      speechSynthesis.speak(utterance);
    }

    // Voice recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      wakeRecognition = new SpeechRecognition();
      wakeRecognition.continuous = true;
      wakeRecognition.interimResults = false;
      wakeRecognition.lang = 'en-US';
      
      wakeRecognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        if (transcript.includes('hey chottu') || transcript.includes('hello chottu')) {
          triggerCommandMode();
        }
      };
      
      wakeRecognition.onend = () => {
        if (wakeWordEnabled && !isListeningForCommand) {
          setTimeout(() => wakeRecognition.start(), 250);
        }
      };
      
      commandRecognition = new SpeechRecognition();
      commandRecognition.continuous = false;
      commandRecognition.interimResults = false;
      commandRecognition.lang = 'en-US';
      
      commandRecognition.onstart = () => {
        isListeningForCommand = true;
        chottuIcon?.classList.add('listening');
        statusPulse.classList.add('listening');
        statusText.textContent = 'LISTENING...';
        userInput.placeholder = 'Listening for command...';
      };
      
      commandRecognition.onresult = (event) => {
        const command = event.results[0][0].transcript;
        userInput.value = command;
        handleUserMessage(command);
      };
      
      commandRecognition.onerror = () => stopCommandMode();
      commandRecognition.onend = () => stopCommandMode();
    }

    function triggerCommandMode() {
      if (isListeningForCommand) return;
      if (wakeRecognition) wakeRecognition.stop();
      setTimeout(() => { if (commandRecognition) commandRecognition.start(); }, 100);
    }

    function stopCommandMode() {
      isListeningForCommand = false;
      chottuIcon?.classList.remove('listening');
      statusPulse.classList.remove('listening');
      statusText.textContent = wakeWordEnabled ? 'WAKE WORD ACTIVE' : 'WAKE WORD OFF';
      userInput.placeholder = "Enter directive or say 'Hey Chottu'...";
      if (wakeWordEnabled && wakeRecognition) {
        setTimeout(() => wakeRecognition.start(), 500);
      }
    }

    wakeToggle.addEventListener('click', () => {
      if (!wakeRecognition) {
        appendMessage('Wake word not supported. Use Chrome or Edge.', 'assistant');
        return;
      }
      wakeWordEnabled = !wakeWordEnabled;
      if (wakeWordEnabled) {
        wakeRecognition.start();
        statusText.textContent = 'WAKE WORD ACTIVE';
        appendMessage('Wake word activated. Say "Hey Chottu" to begin.', 'assistant');
        speak('Wake word activated.');
      } else {
        wakeRecognition.stop();
        statusText.textContent = 'WAKE WORD OFF';
        appendMessage('Wake word deactivated.', 'assistant');
      }
    });

    speakerBtn.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      speakerBtn.classList.toggle('muted', !voiceEnabled);
      speakerBtn.innerHTML = voiceEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
      if (!voiceEnabled) window.speechSynthesis.cancel();
      else speak('Voice output enabled.');
    });

    clearBtn.addEventListener('click', () => {
      if (confirm('Clear all chat history? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        chatWindow.innerHTML = '';
        conversationHistory = [];
        const greeting = `Sir, Chottu is ready. How may I assist you today?`;
        appendMessage(greeting, 'assistant');
        speak(greeting);
      }
    });

    exportBtn.addEventListener('click', () => {
      const dataStr = JSON.stringify(conversationHistory, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `chottu-chat-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      appendMessage('Chat exported.', 'assistant');
    });

    importBtn.addEventListener('click', () => importFile.click());

    importFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const imported = JSON.parse(event.target.result);
          if (Array.isArray(imported)) {
            conversationHistory = imported;
            chatWindow.innerHTML = '';
            conversationHistory.forEach(msg => {
              if (msg.role === 'user') appendMessage(msg.content, 'user');
              else if (msg.role === 'assistant') appendMessage(msg.content, 'assistant');
            });
            saveChatHistory();
            appendMessage('Chat imported successfully.', 'assistant');
            speak('Chat imported.');
          }
        } catch(err) {
          appendMessage('Import failed: Invalid file.', 'assistant');
        }
      };
      reader.readAsText(file);
      importFile.value = '';
    });

    async function sendToAI(userMessage) {
      const messages = [
        { role: 'system', content: JARVIS_PROMPT },
        ...conversationHistory,
        { role: 'user', content: userMessage }
      ];
      
      try {
        const response = await fetch(CHOTTU_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await response.json();
        if (data.choices && data.choices[0]) {
          return data.choices[0].message.content;
        }
        return "Sir, I'm having trouble connecting. Please try again.";
      } catch(e) {
        return `System error: ${e.message}`;
      }
    }

    async function handleUserMessage(messageText) {
      if (!messageText.trim()) return;
      
      appendMessage(messageText, 'user');
      conversationHistory.push({ role: 'user', content: messageText });
      saveChatHistory();
      
      userInput.value = '';
      sendBtn.disabled = true;
      
      const response = await sendToAI(messageText);
      appendMessage(response, 'assistant');
      conversationHistory.push({ role: 'assistant', content: response });
      saveChatHistory();
      speak(response);
      
      sendBtn.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener('click', () => {
      const text = userInput.value.trim();
      if (text) handleUserMessage(text);
    });

    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const text = userInput.value.trim();
        if (text) handleUserMessage(text);
      }
    });

    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const query = chip.getAttribute('data-query');
        if (query === 'Enable wake word') wakeToggle.click();
        else if (query) handleUserMessage(query);
      });
    });

    // Initialize
    const hasHistory = loadChatHistory();
    if (!hasHistory) {
      setTimeout(() => {
        const greeting = `Sir, Chottu is ready. How may I assist you today?`;
        appendMessage(greeting, 'assistant');
        speak(greeting);
      }, 500);
    }
    
    userInput.focus();
  })();
</script>
</body>
</html>
