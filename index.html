<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chottu - Your AI Buddy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e1a;
      color: #00ff88;
      overflow: hidden;
    }
   .container {
      max-width: 900px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }
   .header {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 20px;
      background: rgba(0, 255, 136, 0.05);
      border: 1px solid #00ff88;
      border-radius: 12px;
      margin-bottom: 20px;
    }
   .logo {
      width: 50px;
      height: 50px;
      background: url('final.png') center/cover;
      border-radius: 50%;
      border: 2px solid #00ff88;
    }
   .title { font-size: 28px; font-weight: bold; letter-spacing: 2px; }
   .status { display: flex; gap: 10px; margin-left: auto; }
   .badge {
      padding: 6px 12px;
      border: 1px solid #00ff88;
      border-radius: 20px;
      font-size: 11px;
      background: rgba(0, 255, 136, 0.1);
    }
   .chat-box {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #00ff88;
      border-radius: 12px;
      padding: 20px;
      overflow-y: auto;
      margin-bottom: 20px;
    }
   .msg {
      margin: 15px 0;
      display: flex;
      gap: 12px;
      animation: slideIn 0.3s;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
   .msg.user { flex-direction: row-reverse; }
   .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: url('final.png') center/cover;
      border: 2px solid #00ff88;
      flex-shrink: 0;
    }
   .msg.user.avatar { background: #00ff88; }
   .bubble {
      max-width: 70%;
      padding: 12px 18px;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid #00ff88;
      border-radius: 18px;
      line-height: 1.6;
    }
   .msg.user.bubble { background: rgba(0, 255, 136, 0.2); }
   .input-area {
      display: flex;
      gap: 10px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #00ff88;
      border-radius: 12px;
    }
    input {
      flex: 1;
      padding: 12px 18px;
      background: rgba(0, 255, 136, 0.05);
      border: 1px solid #00ff88;
      border-radius: 25px;
      color: #00ff88;
      font-size: 15px;
      outline: none;
    }
    input::placeholder { color: rgba(0, 255, 136, 0.5); }
    button {
      padding: 12px 20px;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid #00ff88;
      border-radius: 25px;
      color: #00ff88;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { background: rgba(0, 255, 136, 0.2); }
    button.active { background: #00ff88; color: #0a0e1a; }
   .controls { display: flex; gap: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo"></div>
      <div class="title">CHOTTU</div>
      <div class="status">
        <div class="badge" id="wakeStatus">WAKE WORD OFF</div>
        <div class="badge">ENCRYPTED</div>
        <div class="badge">NEXUS-LINK</div>
      </div>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="msg">
        <div class="avatar"></div>
        <div class="bubble">Hai friend, Chottu here. How can I help you today?</div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Enter directive or say 'Hey Chottu'..." />
      <button id="sendBtn">Send</button>
    </div>

    <div class="controls">
      <button id="wakeBtn">Wake Word</button>
      <button id="voiceBtn">Voice Reply</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const wakeBtn = document.getElementById('wakeBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const clearBtn = document.getElementById('clearBtn');
    const wakeStatus = document.getElementById('wakeStatus');

    let messages = [
      {
        role: "system", 
        content: "You are Chottu, a friendly AI buddy from Chennai. Address the user as 'friend' only. Never use their real name unless they tell you. Be casual, helpful, and use simple English. Keep replies short and conversational."
      }
    ];

    let wakeWordOn = false;
    let voiceReplyOn = false;
    let recognition;

    function addMessage(text, isUser) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${isUser? 'user' : ''}`;
      msgDiv.innerHTML = `
        <div class="avatar"></div>
        <div class="bubble">${text}</div>
      `;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function speak(text) {
      if (!voiceReplyOn) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1.1;
      utterance.pitch = 1;
      speechSynthesis.speak(utterance);
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, true);
      userInput.value = '';

      messages.push({ role: "user", content: text });

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });

        const data = await res.json();
        const reply = data.choices[0].message.content;
        
        messages.push({ role: "assistant", content: reply });
        addMessage(reply, false);
        speak(reply);

      } catch (err) {
        addMessage('Sorry friend, connection error. Check if server is running.', false);
      }
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    wakeBtn.onclick = () => {
      wakeWordOn =!wakeWordOn;
      wakeBtn.classList.toggle('active');
      wakeStatus.textContent = wakeWordOn? 'WAKE WORD ON' : 'WAKE WORD OFF';
      
      if (wakeWordOn) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.onresult = (e) => {
          const transcript = e.results[e.results.length - 1][0].transcript.toLowerCase();
          if (transcript.includes('hey chottu') || transcript.includes('hi chottu')) {
            userInput.value = transcript.replace(/hey chottu|hi chottu/, '').trim();
            sendMessage();
          }
        };
        recognition.start();
      } else {
        if (recognition) recognition.stop();
      }
    };

    voiceBtn.onclick = () => {
      voiceReplyOn =!voiceReplyOn;
      voiceBtn.classList.toggle('active');
    };

    clearBtn.onclick = () => {
      chatBox.innerHTML = `
        <div class="msg">
          <div class="avatar"></div>
          <div class="bubble">Hai friend, Chottu here. How can I help you today?</div>
        </div>
      `;
      messages = [messages[0]]; // Keep system prompt
    };
  </script>
</body>
</html>
