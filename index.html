<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chottu - JARVIS AI Assistant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 1.5rem;
    }

    .chottu-container {
      width: 100%;
      max-width: 1100px;
      height: 90vh;
      max-height: 850px;
      background: rgba(6, 18, 14, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 170, 0.5);
      border-radius: 2rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .assistant-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(0, 255, 170, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.3);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .chottu-icon {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: bold;
      color: #00ffaa;
      letter-spacing: 2px;
    }

    .status-panel {
      display: flex;
      gap: 1rem;
    }

    .core-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #00ffaa;
      cursor: pointer;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      background: rgba(0, 255, 170, 0.1);
    }

    .pulse {
      width: 10px;
      height: 10px;
      background: #00ffaa;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .pulse.listening {
      background: #ff4444;
      box-shadow: 0 0 10px #ff4444;
    }

    .neural-badge {
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      background: rgba(0, 255, 170, 0.1);
      color: #00ffaa;
      font-size: 0.8rem;
    }

    .chat-main {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      animation: fadeIn 0.3s ease;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 255, 170, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #00ffaa;
    }

    .avatar img {
      width: 35px;
      height: 35px;
      border-radius: 50%;
    }

    .bubble {
      max-width: 70%;
      padding: 0.8rem 1.2rem;
      background: rgba(0, 255, 170, 0.1);
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 1rem;
      color: #e0ffe8;
      line-height: 1.5;
    }

    .user .bubble {
      background: rgba(0, 255, 170, 0.2);
    }

    .input-zone {
      padding: 1rem 1.5rem;
      border-top: 1px solid rgba(0, 255, 170, 0.3);
      background: rgba(0, 0, 0, 0.3);
    }

    .input-wrapper {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .command-input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00ffaa;
      border-radius: 2rem;
      color: #00ffaa;
      font-size: 1rem;
      outline: none;
    }

    .command-input::placeholder {
      color: rgba(0, 255, 170, 0.5);
    }

    .btn-group {
      display: flex;
      gap: 0.5rem;
    }

    .send-btn, .speaker-btn, .clear-btn, .export-btn, .import-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(0, 255, 170, 0.1);
      border: 1px solid #00ffaa;
      color: #00ffaa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .send-btn:hover, .speaker-btn:hover, .clear-btn:hover, .export-btn:hover, .import-btn:hover {
      background: #00ffaa;
      color: #000;
      transform: scale(1.05);
    }

    .quick-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
      flex-wrap: wrap;
    }

    .chip {
      padding: 0.3rem 1rem;
      background: rgba(0, 255, 170, 0.1);
      border: 1px solid #00ffaa;
      border-radius: 2rem;
      color: #00ffaa;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      background: rgba(0, 255, 170, 0.3);
    }

    @media (max-width: 700px) {
      .chottu-container {
        height: 95vh;
      }
      .bubble {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
<div class="chottu-container">
  <header class="assistant-header">
    <div class="logo-area">
      <img src="nethu_core.png" alt="Chottu" class="chottu-icon" onerror="this.src='https://via.placeholder.com/45?text=C'">
      <div class="logo-text">CHOTTU</div>
    </div>
    <div class="status-panel">
      <div class="core-status" id="wakeToggle">
        <span class="pulse" id="statusPulse"></span>
        <span id="statusText">WAKE WORD OFF</span>
      </div>
      <div class="neural-badge"><i class="fas fa-shield-alt"></i> ENCRYPTED</div>
      <div class="neural-badge"><i class="fas fa-satellite"></i> NEXUS-LINK</div>
    </div>
  </header>

  <div class="chat-main" id="chatWindow">
    <div class="message-row">
      <div class="avatar"><img src="nethu_core.png" alt="Chottu" onerror="this.src='https://via.placeholder.com/35?text=C'"></div>
      <div class="bubble">Sir, Chottu is ready. How may I assist you today?</div>
    </div>
  </div>

  <div class="input-zone">
    <div class="input-wrapper">
      <input type="text" class="command-input" id="userInput" placeholder="Type your message or say 'Hey Chottu'..." autofocus>
      <div class="btn-group">
        <button class="export-btn" id="exportButton" title="Export Chat"><i class="fas fa-download"></i></button>
        <button class="import-btn" id="importButton" title="Import Chat"><i class="fas fa-upload"></i></button>
        <button class="clear-btn" id="clearButton" title="Clear Chat"><i class="fas fa-trash"></i></button>
        <button class="speaker-btn" id="speakerButton" title="Toggle Voice"><i class="fas fa-volume-up"></i></button>
        <button class="send-btn" id="sendButton"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
    <div class="quick-actions">
      <span class="chip" data-query="What's the weather in Chennai">🌤️ Weather</span>
      <span class="chip" data-query="What time is it">🕒 Time</span>
      <span class="chip" data-query="Latest news headlines">📰 News</span>
      <span class="chip" data-query="Who won IPL 2026">🏏 IPL Winner</span>
      <span class="chip" data-query="IPL 2026 status">🏏 IPL Status</span>
      <span class="chip" data-query="Open YouTube">▶ YouTube</span>
      <span class="chip" data-query="Open Gmail">📧 Gmail</span>
      <span class="chip" data-query="Enable wake word">🎤 Wake Word</span>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none">

<script>
  (function() {
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendButton');
    const speakerBtn = document.getElementById('speakerButton');
    const clearBtn = document.getElementById('clearButton');
    const exportBtn = document.getElementById('exportButton');
    const importBtn = document.getElementById('importButton');
    const importFile = document.getElementById('importFile');
    const wakeToggle = document.getElementById('wakeToggle');
    const statusPulse = document.getElementById('statusPulse');
    const statusText = document.getElementById('statusText');

    const CHOTTU_ENDPOINT = '/api/chat';
    const STORAGE_KEY = 'chottu_chat_history';
    const NAME_KEY = 'chottu_username';

    let USER_NAME = localStorage.getItem(NAME_KEY) || 'sir';
    let voiceEnabled = true;
    let wakeWordEnabled = false;
    let wakeRecognition = null;
    let commandRecognition = null;
    let isListeningForCommand = false;
    let hasGreeted = false;

    const APP_LINKS = {
      'youtube': 'https://youtube.com',
      'gmail': 'https://mail.google.com',
      'google': 'https://google.com',
      'maps': 'https://maps.google.com',
      'github': 'https://github.com',
      'reddit': 'https://reddit.com',
      'iplt20': 'https://iplt20.com',
      'cricbuzz': 'https://cricbuzz.com'
    };

    let conversationHistory = [];

    function getSystemPrompt() {
      return `You are Chottu - an AI assistant that responds exactly like JARVIS from Iron Man. Call the user "${USER_NAME}" or "sir". Be concise (2-3 sentences). Be direct and professional. Never say "as an AI".`;
    }

    function appendMessage(text, sender = 'assistant') {
      const row = document.createElement('div');
      row.className = `message-row ${sender}`;
      
      const avatarHtml = sender === 'user'
        ? `<div class="avatar"><i class="fas fa-user-astronaut"></i></div>`
        : `<div class="avatar"><img src="nethu_core.png" alt="Chottu" onerror="this.src='https://via.placeholder.com/35?text=C'"></div>`;
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = text.replace(/\n/g, '<br>');
      
      if (sender === 'user') {
        row.appendChild(bubble);
        row.insertAdjacentHTML('beforeend', avatarHtml);
      } else {
        row.insertAdjacentHTML('beforeend', avatarHtml);
        row.appendChild(bubble);
      }
      
      chatWindow.appendChild(row);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function speak(text) {
      if (!voiceEnabled || !('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const cleanText = text.replace(/<[^>]*>/g, '').replace(/[*_#`]/g, '');
      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.rate = 0.9;
      utterance.pitch = 0.8;
      speechSynthesis.speak(utterance);
    }

    function loadChatHistory() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          conversationHistory = JSON.parse(saved);
          conversationHistory.forEach(msg => {
            if (msg.role === 'user') appendMessage(msg.content, 'user');
            else if (msg.role === 'assistant') appendMessage(msg.content, 'assistant');
          });
          return true;
        } catch(e) { localStorage.removeItem(STORAGE_KEY); }
      }
      return false;
    }

    function saveChatHistory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
      } catch(e) {}
    }

    async function sendToAI(userMessage) {
      const messages = [
        { role: 'system', content: getSystemPrompt() },
        ...conversationHistory,
        { role: 'user', content: userMessage }
      ];
      
      try {
        const response = await fetch(CHOTTU_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await response.json();
        if (data.choices && data.choices[0]) {
          return data.choices[0].message.content;
        }
        return "Sir, I'm having trouble connecting. Please try again.";
      } catch(e) {
        return `Sir, error: ${e.message}`;
      }
    }

    async function handleUserMessage(messageText) {
      if (!messageText.trim()) return;
      
      appendMessage(messageText, 'user');
      conversationHistory.push({ role: 'user', content: messageText });
      saveChatHistory();
      
      userInput.value = '';
      sendBtn.disabled = true;
      
      const response = await sendToAI(messageText);
      appendMessage(response, 'assistant');
      conversationHistory.push({ role: 'assistant', content: response });
      saveChatHistory();
      speak(response);
      
      sendBtn.disabled = false;
      userInput.focus();
    }

    // Voice Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      wakeRecognition = new SpeechRecognition();
      wakeRecognition.continuous = true;
      wakeRecognition.interimResults = false;
      wakeRecognition.lang = 'en-US';
      
      wakeRecognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        if (transcript.includes('hey chottu') || transcript.includes('hello chottu')) {
          triggerCommandMode();
        }
      };
      
      wakeRecognition.onend = () => {
        if (wakeWordEnabled && !isListeningForCommand) {
          setTimeout(() => wakeRecognition.start(), 300);
        }
      };
      
      commandRecognition = new SpeechRecognition();
      commandRecognition.continuous = false;
      commandRecognition.interimResults = false;
      commandRecognition.lang = 'en-US';
      
      commandRecognition.onstart = () => {
        isListeningForCommand = true;
        statusPulse.classList.add('listening');
        statusText.textContent = 'LISTENING...';
        userInput.placeholder = 'Listening...';
      };
      
      commandRecognition.onresult = (event) => {
        const command = event.results[0][0].transcript;
        userInput.value = command;
        handleUserMessage(command);
      };
      
      commandRecognition.onend = () => {
        isListeningForCommand = false;
        statusPulse.classList.remove('listening');
        statusText.textContent = wakeWordEnabled ? 'WAKE WORD ACTIVE' : 'WAKE WORD OFF';
        userInput.placeholder = "Type your message or say 'Hey Chottu'...";
        if (wakeWordEnabled) setTimeout(() => wakeRecognition.start(), 500);
      };
    }
    
    function triggerCommandMode() {
      if (isListeningForCommand) return;
      if (wakeRecognition) wakeRecognition.stop();
      setTimeout(() => { if (commandRecognition) commandRecognition.start(); }, 100);
    }
    
    wakeToggle.addEventListener('click', () => {
      if (!wakeRecognition) {
        appendMessage('Wake word not supported. Use Chrome or Edge.', 'assistant');
        return;
      }
      wakeWordEnabled = !wakeWordEnabled;
      if (wakeWordEnabled) {
        wakeRecognition.start();
        statusText.textContent = 'WAKE WORD ACTIVE';
        appendMessage('Wake word activated. Say "Hey Chottu" to begin.', 'assistant');
        speak('Wake word activated.');
      } else {
        wakeRecognition.stop();
        statusText.textContent = 'WAKE WORD OFF';
        appendMessage('Wake word deactivated.', 'assistant');
      }
    });
    
    speakerBtn.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      speakerBtn.classList.toggle('muted', !voiceEnabled);
      speakerBtn.innerHTML = voiceEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
      if (!voiceEnabled) window.speechSynthesis.cancel();
      else speak('Voice output enabled.');
    });
    
    clearBtn.addEventListener('click', () => {
      if (confirm('Clear all chat history?')) {
        localStorage.removeItem(STORAGE_KEY);
        chatWindow.innerHTML = '';
        conversationHistory = [];
        const greeting = `Sir, Chottu is ready. How may I assist you today?`;
        appendMessage(greeting, 'assistant');
        speak(greeting);
      }
    });
    
    exportBtn.addEventListener('click', () => {
      const dataStr = JSON.stringify(conversationHistory, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `chottu-chat-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      appendMessage('Chat exported.', 'assistant');
    });
    
    importBtn.addEventListener('click', () => importFile.click());
    
    importFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const imported = JSON.parse(event.target.result);
          if (Array.isArray(imported)) {
            conversationHistory = imported;
            chatWindow.innerHTML = '';
            conversationHistory.forEach(msg => {
              if (msg.role === 'user') appendMessage(msg.content, 'user');
              else if (msg.role === 'assistant') appendMessage(msg.content, 'assistant');
            });
            saveChatHistory();
            appendMessage('Chat imported successfully.', 'assistant');
            speak('Chat imported.');
          }
        } catch(err) {
          appendMessage('Import failed: Invalid file.', 'assistant');
        }
      };
      reader.readAsText(file);
      importFile.value = '';
    });
    
    sendBtn.addEventListener('click', () => {
      const text = userInput.value.trim();
      if (text) handleUserMessage(text);
    });
    
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const text = userInput.value.trim();
        if (text) handleUserMessage(text);
      }
    });
    
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const query = chip.getAttribute('data-query');
        if (query === 'Enable wake word') wakeToggle.click();
        else if (query) handleUserMessage(query);
      });
    });
    
    // Initial load
    const hasHistory = loadChatHistory();
    if (!hasHistory) {
      setTimeout(() => {
        const greeting = `Sir, Chottu is ready. How may I assist you today?`;
        appendMessage(greeting, 'assistant');
        speak(greeting);
      }, 500);
    }
    
    userInput.focus();
  })();
</script>
</body>
</html>
